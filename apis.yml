description: BioNTech is a Mainz-based biotechnology company that pioneered the use of messenger RNA (mRNA) technology in
  human therapeutics. Best known for co-developing Comirnaty, the COVID-19 mRNA vaccine with Pfizer, BioNTech is building
  a broad oncology pipeline across mRNA cancer immunotherapies, next-generation immunomodulators such as the bispecific
  antibody BNT327, and targeted therapies, as well as continuing infectious disease vaccine development. BioNTech does not
  currently expose a public developer API; this index captures the company's products, pipeline, clinical trials, and corporate
  resources as an API Evangelist profile.
